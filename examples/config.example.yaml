# ──────────────────────────────────────────────
# Skill Evolution Plugin — Basic Config
# 大多数用户只需要设置以下字段
# ──────────────────────────────────────────────

skillEvolution:
  enabled: true

  # Review 模式 — 控制 session 结束后 patch 的处理方式
  # off:           不执行 review pipeline
  # queue-only:    生成 patch 并入队，不启动 agent（默认）
  # assisted:      入队 + 委派到 agent session + 可选通知
  # auto-low-risk: 同 assisted，但低风险 patch 自动 apply
  reviewMode: "queue-only"

  merge:
    requireHumanMerge: true
    maxRollbackVersions: 5

  sessionOverlay:
    enabled: true
    storageDir: ".skill-overlays"
    injectMode: "system-context"
    clearOnSessionEnd: true

  triggers:
    onToolError: true
    onUserCorrection: true
    onSessionEndReview: true
    onPositiveFeedback: true

  llm:
    inheritPrimaryConfig: true
    modelOverride: null
    thinkingOverride: null

  review:
    minEvidenceCount: 2
    allowAutoMergeOnLowRiskOnly: false

  # 通知（可选）
  notify:
    enabled: false
    mode: "off"           # off / per-session / digest
    channel: "same-thread"

# ──────────────────────────────────────────────
# Advanced Config — 以下字段通常不需要修改
# ──────────────────────────────────────────────

  # 顶层 Agent（在 WebUI 中显示的唯一 agent）
  agent:
    enabled: true
    id: "skill-evolution"     # 对应 openclaw agents list 中的 id
    model: null               # null = 继承 OpenClaw 主配置

  # 内部 Session 配置（review 和 notify 是 agent 内部 session）
  sessions:
    review:
      enabled: true
      reuse: true             # 复用 session（推荐）
      thread: true
      timeoutSeconds: 180
    notify:
      enabled: true
      reuse: true
      thread: true
      timeoutSeconds: 60

  # Patch Queue 存储配置
  queue:
    storageDir: ".skill-patches"
    metadataFile: ".skill-patches/index.json"
    dedupeWindowMinutes: 60
    maxPendingPerSkill: 20

  # 通知策略
  notifications:
    debounceSeconds: 300
    digestCron: ""                # 空 = 不聚合; 例如 "0 9 * * *" = 每天 9 点
    minRiskToInterrupt: "medium"  # low / medium / high

  # 风险策略
  risk:
    autoApplyMaxRisk: "low"       # auto-low-risk 模式下自动 apply 的最高风险
    notifyMinRisk: "low"          # 触发通知的最低风险

# ──────────────────────────────────────────────
# 迁移说明
# ──────────────────────────────────────────────
# 如果之前使用了 agents.review / agents.notify 配置：
# - 这些字段仍然有效（自动迁移到 agent + sessions）
# - 建议迁移到新的 agent + sessions 格式
# - agents.review.agentId / agents.notify.agentId 已弃用
# - 现在只有一个顶层 agent: skill-evolution
